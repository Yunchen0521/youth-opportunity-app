name: 更新機會資料

# 預設：手動觸發（到 GitHub 的 Actions 分頁按「Run workflow」）
# 想改成每日自動：把下面 schedule 兩行的註解拿掉即可
on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 22 * * *"   # 每天 UTC 22:00 = 台灣早上 6 點

permissions:
  contents: write            # 允許 workflow 把更新後的 JSON commit 回 repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install -r pipeline/requirements.txt

      - name: 抓取並合併資料
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # 需在 repo Settings → Secrets 設定
        run: python pipeline/extract.py

      - name: 有變更才 commit
        run: |
          if [[ -n "$(git status --porcelain data/opportunities.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/opportunities.json
            git commit -m "chore: 自動更新機會資料 ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "資料無變更，略過 commit"
          fi
